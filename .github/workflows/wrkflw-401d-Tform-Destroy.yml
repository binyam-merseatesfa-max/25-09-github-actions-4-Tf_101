name: Cleanup-Terraform +GitHub Actions resources

on: workflow_dispatch

jobs:
  Destroy-Terraform_Infra-Cleanup:
        runs-on: ubuntu-latest
        steps:   
           - name: Bye test
             run: |
                echo "Bye  we are going to clean up resources, running by workflow workflow_dispatch...!"
                date

           - name: Checkout
             uses: actions/checkout@v7
      
           - name: Setup Terraform
             uses: hashicorp/setup-terraform@v4
      
           - name: Configure AWS Credentials
             uses: aws-actions/configure-aws-credentials@v6
             with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-central-1
      
           - name: Terraform Init
             run: terraform init
            
           - name: Terraform Destroy
             run: terraform destroy --auto-approve    

           - name: Post a message in channel (25-09-bt)
             if: ${{ success()}}
             uses: slackapi/slack-github-action@v3.0.3
             with:
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL_201_BT }}
                  webhook-type: incoming-webhook
                  payload: |
                        text: "✅ tf Destroy/Clean-up Pipeline successfull done! run by ${{github.actor}}. Pipeline : ${{github.workflow}}"  
            
           - name: Post a message in channel (25-09-bt)
             if: ${{ failure()}}
             uses: slackapi/slack-github-action@v3.0.3
             with:
              webhook: ${{ secrets.SLACK_WEBHOOK_URL_201_BT }}
              webhook-type: incoming-webhook
              payload: |
                      text: "❌ tf Destroy/Clean-up Pipeline failed. Please review & FIX ASAP !!!."        
